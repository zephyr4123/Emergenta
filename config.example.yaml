# ============================================================
# AI文明模拟器 - 全局配置文件（模版）
# 复制本文件为 config.yaml 并填入实际 API 密钥后使用
# ============================================================

# --- 项目信息 ---
project:
  name: "CivSim"
  version: "0.1.0"

# --- LLM 配置 ---
llm:
  gateway: "litellm"
  # 如使用 OpenAI 兼容中转，取消下面两行注释并填入
  # default_api_key: "your-api-key-here"
  # default_base_url: "https://your-api-endpoint/v1"
  models:
    governor:
      provider: "anthropic"
      model: "claude-3-5-haiku-20241022"
      max_tokens: 1024
      temperature: 0.7
    leader:
      provider: "anthropic"
      model: "claude-sonnet-4-20250514"
      max_tokens: 2048
      temperature: 0.8
    leader_opus:
      provider: "anthropic"
      model: "claude-opus-4-20250514"
      max_tokens: 4096
      temperature: 0.9
  cache:
    enabled: true
    similarity_threshold: 0.92
    max_cache_size: 10000

# --- 世界引擎配置 ---
world:
  grid:
    width: 100
    height: 100
  map_generation:
    algorithm: "perlin_noise"
    seed: null                          # null 表示随机种子
    elevation_scale: 20.0
    moisture_scale: 15.0
    octaves: 6
    persistence: 0.5
  tile_thresholds:
    mountain_elevation: 0.70
    water_moisture: 0.60
    forest_elevation: 0.50
    farmland_moisture: 0.30
  settlement:
    auto_placement: true
    min_suitability_score: 0.3
    initial_count: 8

# --- 时间系统 ---
clock:
  ticks_per_day: 4
  days_per_season: 30
  seasons_per_year: 4
  governor_decision_interval: "season"  # 镇长每季度决策
  leader_decision_interval: "year"      # 首领每年度决策

# --- Agent 配置 ---
agents:
  civilian:
    initial_count: 1000
    personality_distribution:
      compliant: 0.30                   # 顺从型比例
      neutral: 0.35                     # 中立型比例
      rebellious: 0.35                  # 叛逆型比例
    revolt_threshold:
      mean: 0.18                        # Granovetter 阈值均值
      std: 0.12                         # 标准差
      min: 0.05
      max: 0.80
    hunger_decay_per_tick: 0.02
  governor:
    initial_count: 0                    # >0 时启用镇长层 (Phase 2)
    decision_context_window: 120
  leader:
    initial_count: 0                    # >0 时启用首领层 (Phase 3)
    memory_max_entries: 500

# --- 资源系统 ---
resources:
  types: ["food", "wood", "ore", "gold"]
  regeneration:
    farmland_per_tick: 0.5
    forest_per_tick: 0.3
    mine_per_tick: 0.0                  # 矿石不可再生
  consumption:
    food_per_civilian_per_tick: 0.5
  initial_stockpile:
    food: 300
    wood: 200
    ore: 50
    gold: 100

# --- 通信配置 ---
mqtt:
  broker_host: "localhost"
  broker_port: 1883
  topics:
    p2p: "civsim/agent/{agent_id}/direct"
    settlement: "civsim/settlement/{settlement_id}/broadcast"
    global: "civsim/world/broadcast"

# --- 数据存储 ---
database:
  engine: "duckdb"
  path: "data/simulations/civsim.duckdb"
  snapshot_interval: 100                # 每 100 tick 存一次快照

# --- 测试配置 ---
testing:
  use_real_llm: true
  test_simulation_ticks: 50
  test_civilian_count: 20
  test_grid_size: 20

# --- 可视化 ---
visualization:
  enabled: true
  renderer: "matplotlib"                # matplotlib | plotly
  update_interval: 10
  export_format: "png"

# --- Ray 分布式执行 ---
ray:
  enabled: false
  num_workers: 4
  batch_size: 100
  object_store_memory_mb: 200

# --- 性能优化 ---
performance:
  parallel_threshold: 200               # 平民数量超过此阈值时启用并行
  profiling_enabled: false

# --- 革命参数 ---
revolution_params:
  protest_threshold: 0.20               # 触发革命的抗议率阈值
  satisfaction_threshold: 0.40          # 触发革命的满意度阈值
  duration_ticks: 8                     # 革命持续tick数
  cooldown_ticks: 30                    # 革命冷却期
  honeymoon_ticks: 40                   # 蜜月期持续tick数
  honeymoon_satisfaction_boost: 0.02    # 蜜月期满意度恢复加成
  honeymoon_vigilance_reduction: 0.05   # 蜜月期警觉降低
  resource_penalty_gold: 0.5            # 革命后金币留存比例
  resource_penalty_food: 0.8            # 革命后食物留存比例
  security_penalty: 0.4                 # 革命后治安惩罚
  post_revolution_tax: 0.15             # 革命后默认税率
  # --- 革命后遗症 (默认=0 不影响现有行为) ---
  aftermath_productivity_decay: 0.0     # 革命后基础设施衰减比例 [0-0.5]
  aftermath_trust_penalty: 0.0          # 革命后阵营外交信任惩罚 [0-1]
  aftermath_max_cumulative_decay: 0.0   # 多次革命累积衰减上限 [0-0.9]

# --- 贸易参数 ---
trade_params:
  trust_threshold: 0.4                  # 贸易信任阈值
  refuse_prob_base: 0.3                 # 基础拒绝概率
  refuse_prob_trust_factor: 0.2         # 信任对拒绝概率的影响
  trust_boost_per_trade: 0.01           # 每次贸易信任增加
  surplus_trade_ratio: 0.3              # 盈余可贸易比例
  base_price_food: 1.0                  # 食物基础价格（金币/单位）
  base_price_wood: 1.5                  # 木材基础价格
  base_price_ore: 3.0                   # 矿石基础价格
  min_surplus_ratio: 0.5                # 最小可交易盈余比例
  distance_cost_factor: 0.05            # 距离运输成本系数
  min_trade_amount: 0.5                 # 最小交易数量
  food_surplus_threshold: 8.0           # 食物盈余人均阈值
  other_surplus_threshold: 3.0          # 其他资源盈余人均阈值
  food_deficit_threshold: 3.0           # 食物短缺人均阈值
  other_deficit_threshold: 1.0          # 其他资源短缺人均阈值

# --- 马尔可夫系数 ---
markov_coefficients:
  hunger_to_protest_working: 0.60       # 饥饿→劳作中抗议
  hunger_to_migrate_working: 0.15       # 饥饿→劳作中迁徙
  hunger_to_protest_resting: 0.45       # 饥饿→休息中抗议
  hunger_to_work_resting: 0.20          # 饥饿→休息中劳作
  hunger_to_protest_social: 0.50        # 饥饿→社交中抗议
  hunger_to_protest_trading: 0.30       # 饥饿→交易中抗议
  tax_to_protest_working: 0.45          # 税率→劳作中抗议
  tax_to_protest_resting: 0.30          # 税率→休息中抗议
  tax_to_protest_trading: 0.30          # 税率→交易中抗议
  tax_to_protest_social: 0.25           # 税率→社交中抗议
  safety_to_fight_social: 0.10          # 不安全→社交中战斗
  safety_to_fight_protest: 0.30         # 不安全→抗议中战斗
  granovetter_burst_working: 0.80       # Granovetter 爆发: 劳作→抗议
  granovetter_burst_resting: 0.70       # Granovetter 爆发: 休息→抗议
  granovetter_burst_social: 0.85        # Granovetter 爆发: 社交→抗议
  granovetter_burst_trading: 0.60       # Granovetter 爆发: 交易→抗议
  granovetter_burst_migrating: 0.50     # Granovetter 爆发: 迁徙→抗议

# --- 满意度系数 ---
satisfaction_coefficients:
  scarcity_high_penalty: 0.10           # 高稀缺度惩罚（scarcity > 0.5）
  scarcity_mid_penalty: 0.04            # 中稀缺度惩罚（scarcity > 0.3）
  scarcity_low_recovery: 0.01           # 低稀缺度恢复（scarcity < 0.2）
  tax_penalty_threshold: 0.3            # 税率惩罚触发阈值
  tax_penalty_factor: 0.15              # 税率惩罚系数
  hunger_penalty_threshold: 0.6         # 饥饿惩罚触发阈值
  hunger_penalty: 0.08                  # 饥饿惩罚值
  oppression_threshold: 0.8             # 警察国家效应触发阈值
  oppression_factor: 0.03               # 警察国家效应系数

# --- 自适应控制器 ---
adaptive_controller:
  enabled: true
  update_interval: 10                   # 每 N tick 更新一次
  target_temperature: 0.30              # 目标"温度"（抗议率）
  adjustment_rate: 0.15                 # P-controller 调节速率
  min_multiplier: 0.3                   # 乘数下限
  max_multiplier: 2.0                   # 乘数上限
  lookback_ticks: 200                   # 回溯窗口

# --- 地块属性参数 ---
tile_params:
  default_fertility: 0.8                # 农田默认肥力 [0-1]
  default_density: 0.8                  # 森林默认密度 [0-1]
  default_reserve: 100.0                # 矿山默认储量
  farmland_base_output: 2.0             # 农田每tick基础产出
  forest_base_output: 0.5               # 森林每tick基础产出
  mine_max_output: 1.0                  # 矿山每tick最大产出
  fertility_regen_factor: 0.001         # 肥力自然恢复系数
  density_regen_factor: 0.001           # 密度自然恢复系数
  consume_fertility_decay: 0.01         # 采集后肥力衰减系数
  consume_density_decay: 0.02           # 采集后密度衰减系数

# --- 季节效应参数 ---
season_params:
  farm_spring: 1.0                      # 春季农田产出倍率
  farm_summer: 1.5                      # 夏季农田产出倍率
  farm_autumn: 1.2                      # 秋季农田产出倍率
  farm_winter: 0.3                      # 冬季农田产出倍率
  forest_spring: 1.0                    # 春季森林产出倍率
  forest_summer: 1.2                    # 夏季森林产出倍率
  forest_autumn: 0.8                    # 秋季森林产出倍率
  forest_winter: 0.5                    # 冬季森林产出倍率
  food_consumption_winter: 1.5          # 冬季食物消耗倍率
  spring_growth_bonus: 1.5              # 春季人口增长加成
  autumn_trade_bonus: 1.3               # 秋季贸易收益加成

# --- 地图聚落适宜度参数 ---
map_suitability:
  farmland_weight: 0.3                  # 农田权重
  water_weight: 0.4                     # 水源权重
  forest_weight: 0.1                    # 森林权重
  flatness_weight: 0.5                  # 平坦度权重
  optimal_elevation: 0.3                # 最佳海拔 [0-1]
  suitability_radius: 5                 # 评估半径
  min_settlement_distance: 10           # 聚落间最小距离
  territory_radius: 3                   # 领地分配半径

# --- 随机事件参数 ---
event_params:
  drought_prob: 0.002                   # 旱灾概率
  plague_prob: 0.001                    # 瘟疫概率
  mine_discovery_prob: 0.003            # 矿脉发现概率
  harvest_prob: 0.005                   # 丰收概率
  bandits_prob: 0.002                   # 流寇概率
  drought_duration: 30                  # 旱灾持续tick数
  drought_fertility_mult: 0.3           # 旱灾肥力乘数
  plague_pop_loss_ratio: 0.10           # 瘟疫人口损失比例
  harvest_duration: 15                  # 丰收持续tick数
  harvest_food_bonus: 5.0               # 丰收每tick食物加成
  bandits_gold_mult: 0.7                # 流寇金币留存比例
  bandits_security_loss: 0.2            # 流寇治安损失

# --- 引擎核心参数 ---
engine_params:
  profession_farmer_ratio: 0.4          # 农民比例
  profession_woodcutter_ratio: 0.2      # 伐木工比例
  profession_miner_ratio: 0.2           # 矿工比例
  profession_merchant_ratio: 0.2        # 商人比例
  natural_growth_rate: 0.002            # 自然人口增长率
  starvation_scarcity_threshold: 0.7    # 饥荒触发稀缺阈值
  starvation_rate_factor: 0.1           # 饥荒死亡率系数
  neighbor_radius: 3                    # 邻居搜索半径

# --- 平民行为参数 ---
civilian_behavior:
  work_output_food: 2.5                 # 劳作食物产出
  work_output_other: 1.0                # 劳作其他资源产出
  rest_hunger_recovery: 0.05            # 休息饥饿恢复量
  trade_gold_output: 0.3                # 交易金币产出
  food_satiation_recovery: 0.06         # 进食后饥饿恢复量
  food_satisfaction_ratio: 0.8          # 满足进食的食物比例阈值
  initial_satisfaction: 0.7             # 初始满意度

# --- 镇长回退决策参数 ---
governor_fallback:
  scarcity_threshold: 0.5               # 食物紧缺判定阈值
  scarcity_tax_change: -0.05            # 紧缺时降税幅度
  protest_threshold: 0.2                # 抗议率判定阈值
  protest_security_change: 0.1          # 抗议时加安幅度
  high_protest_threshold: 0.4           # 高抗议率阈值
  high_protest_tax_change: -0.03        # 高抗议时降税幅度
  low_satisfaction_threshold: 0.3       # 低满意度阈值
  low_satisfaction_tax_change: -0.05    # 低满意度降税幅度
  stable_scarcity_max: 0.2              # 稳定期最大稀缺度
  stable_protest_max: 0.1               # 稳定期最大抗议率
  stable_satisfaction_min: 0.6          # 稳定期最低满意度
  stable_tax_change: 0.03               # 稳定期加税幅度

# --- 首领回退决策参数 ---
leader_fallback:
  war_strength_ratio: 1.3               # 宣战实力比阈值
  war_probability: 0.3                  # 宣战概率
  betrayal_trust_threshold: 0.3         # 背叛信任阈值
  betrayal_probability: 0.2             # 背叛概率
  scapegoat_satisfaction_threshold: 0.4 # 转嫁矛盾满意度阈值
  scapegoat_probability: 0.2            # 转嫁矛盾概率
  protest_threshold: 0.3                # 首领抗议率阈值
  low_satisfaction_threshold: 0.3       # 首领低满意度阈值
  military_gold_weight: 0.5             # 军事实力中金币权重
  military_pop_weight: 0.1              # 军事实力中人口权重
  war_trust_penalty: -0.2               # 宣战信任惩罚
  embargo_trust_penalty: -0.15          # 禁运信任惩罚

# --- 治理机制参数 ---
governance_params:
  tax_change_limit: 0.1                 # 单次税率变化上限
  security_change_limit: 0.15           # 单次治安变化上限
  governance_food_weight: 0.4           # 治理评分中食物权重
  governance_pop_weight: 0.3            # 治理评分中人口权重
  governance_stability_weight: 0.3      # 治理评分中稳定性权重
  tax_stability_factor: 0.3             # 税率对稳定性的影响系数

# --- 外交系统参数 ---
diplomacy_params:
  initial_trust: 0.5                    # 初始信任度
  trust_decay_per_tick: 0.001           # 每tick信任衰减
  treaty_trust_boost: 0.1               # 签约信任加成
  break_treaty_penalty: -0.3            # 违约信任惩罚
  downgrade_trust_threshold: 0.2        # 自动降级信任阈值
  randomize_trust: true                 # 是否随机化初始信任
  trust_random_min: 0.2                 # 随机信任下限
  trust_random_max: 0.6                 # 随机信任上限

# --- 聚落参数 ---
settlement_params:
  default_capacity: 200                 # 默认人口容量
  default_infrastructure: 0.5           # 默认基础设施水平
  default_tax_rate: 0.1                 # 默认税率
  default_security_level: 0.5           # 默认治安水平
  scarcity_full_threshold: 5.0          # 稀缺度满足阈值（人均食物）
  starvation_unfed_factor: 0.05         # 未喂食饿死系数

# --- 涌现检测参数 ---
analytics_params:
  trade_growth_threshold: 50.0          # 贸易网络涌现增长阈值
  war_cascade_min_wars: 2               # 战争级联最少战争数

# --- LLM 网关参数 ---
gateway_params:
  max_retries: 2                        # 最大重试次数
  timeout: 30                           # 超时时间（秒）
  retry_backoff_base: 1.0               # 重试退避基数

# --- 记忆系统参数 ---
memory_params:
  importance_threshold: 0.7             # 长期记忆重要度阈值
  decision_importance: 0.8              # 决策记忆默认重要度

# --- 首领 Prompt 配置 ---
# 可自定义首领 AI 的决策风格和行为准则
# 设置 system_prompt 即可覆盖默认的竞争性/攻击性决策 Prompt
# 示例：改为和平主义风格
#   leader_prompt:
#     system_prompt: "你是一个和平主义首领..."
leader_prompt:
  system_prompt: ""                     # 留空则使用内置默认 Prompt
